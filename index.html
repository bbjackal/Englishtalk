<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小學英文學習寶庫 🌟</title>
    <style>
        :root {
            --primary-color: #FF6B6B; /* 珊瑚紅 */
            --secondary-color: #4ECDC4; /* 薄荷綠 */
            --accent-color: #FFD93D; /* 太陽黃 */
            --speak-color: #6C5CE7; /* 浪漫紫 */
            --bg-gradient: linear-gradient(135deg, #A8E6CF 0%, #DCEDC1 100%);
        }

        body { 
            font-family: 'Microsoft JhengHei', sans-serif; 
            margin: 0; 
            background: var(--bg-gradient); 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container { 
            display: flex; 
            width: 95%; 
            max-width: 1000px; 
            height: 80vh; 
            background: rgba(255, 255, 255, 0.98); 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); 
            overflow: hidden;
            border: 6px solid #FFF;
        }

        /* 左側：查詢區 */
        .left-panel { 
            flex: 1.2; 
            padding: 30px; 
            display: flex; 
            flex-direction: column; 
            background: #fff;
        }

        h1 { color: var(--primary-color); text-align: center; margin-bottom: 20px; font-size: 26px; }

        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        
        input { 
            flex: 1; 
            padding: 12px 18px; 
            border: 3px solid var(--secondary-color); 
            border-radius: 50px; 
            font-size: 18px; 
            outline: none;
        }

        .search-btn { 
            background: var(--secondary-color); 
            color: white; 
            border: none; 
            padding: 0 25px; 
            border-radius: 50px; 
            font-size: 18px; 
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .search-btn:hover { background: #3dbbb3; transform: scale(1.05); }

        /* 結果顯示區 */
        #result-area { 
            flex: 1; 
            background: #FFFCEB; 
            border-radius: 20px; 
            padding: 20px; 
            border: 3px dashed var(--accent-color);
            display: none;
            animation: bounceIn 0.5s;
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.9); }
            70% { transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }

        .word-title { font-size: 30px; color: #333; margin: 0 0 10px 0; border-bottom: 2px solid #EEE; padding-bottom: 5px; }
        .word-meaning { font-size: 19px; color: #555; line-height: 1.5; background: white; padding: 12px; border-radius: 12px; min-height: 60px; }

        /* 按鈕並排設定 */
        .action-buttons { 
            margin-top: 25px; 
            display: flex; 
            gap: 12px; 
        }
        
        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        .speak-btn { background: var(--speak-color); }
        .add-btn { background: var(--primary-color); }

        .btn:hover { transform: translateY(-3px); box-shadow: 0 6px 0 rgba(0,0,0,0.1); opacity: 0.9; }
        .btn:active { transform: translateY(0); box-shadow: 0 2px 0 rgba(0,0,0,0.1); }

        /* 右側：清單區 */
        .right-panel { 
            flex: 0.8; 
            background: #F8F9FA; 
            padding: 25px; 
            overflow-y: auto; 
            border-left: 2px solid #F0F0F0;
        }

        h3 { color: #555; font-size: 20px; margin-top: 0; display: flex; align-items: center; gap: 8px; }

        .list-item { 
            background: white; 
            padding: 12px 15px; 
            margin-bottom: 10px; 
            border-radius: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }
        .list-item:hover { border-color: var(--secondary-color); background: #f0fffe; }
        .list-item span { font-weight: bold; color: #444; font-size: 16px; flex: 1; }

        /* 右側清單小按鈕設定 */
        .list-actions { display: flex; gap: 6px; }

        .mini-btn { 
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .mini-play { background: #E8E6FF; color: var(--speak-color); }
        .mini-play:hover { background: #d0cfff; }
        
        .mini-delete { background: #FFE6E6; color: #FF6B6B; }
        .mini-delete:hover { background: #ffcccc; }
    </style>
</head>
<body>

<div class="container">
    <div class="left-panel">
        <h1>🌟 英文學習小隊 🚀</h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="輸入單字或句子..." onkeypress="handleKeyPress(event)">
            <button class="search-btn" onclick="searchWord()">查詢</button>
        </div>

        <div id="result-area">
            <h2 id="displayWord" class="word-title"></h2>
            <div id="displayMeaning" class="word-meaning"></div>
            
            <div class="action-buttons">
                <button class="btn speak-btn" onclick="speakCurrentWord()">📢 唸給我聽</button>
                <button class="btn add-btn" onclick="addToPlaylist()">✨ 收藏起來</button>            
            </div>
        </div>
    </div>

    <div class="right-panel">
        <h3>⭐ 我的單字庫</h3>
        <div id="wordList"></div>
    </div>
</div>

<script>
    let currentData = null;
    let savedWords = JSON.parse(localStorage.getItem('myWords')) || [];

    renderList();

    async function searchWord() {
        const input = document.getElementById('searchInput').value.trim();
        if (!input) return;

        const apiUrl = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(input)}&langpair=en|zh-TW`;
        
        try {
            document.getElementById('displayMeaning').innerText = "正在翻譯中...";
            document.getElementById('result-area').style.display = 'block';
            
            const response = await fetch(apiUrl);
            const data = await response.json();
            const translation = data.responseData.translatedText;

            currentData = {
                word: input,
                meaning: translation
            };

            updateLeftPanel();
        } catch (error) {
            alert("網路好像有點累了，請稍後再試！");
        }
    }

    function updateLeftPanel() {
        document.getElementById('displayWord').innerText = currentData.word;
        document.getElementById('displayMeaning').innerText = currentData.meaning;
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') searchWord();
    }

    function speak(text) {
        window.speechSynthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(text);

        const voices = speechSynthesis.getVoices();
        const voice =
            voices.find(v => v.name.includes('Google US English')) ||
            voices.find(v => v.lang === 'en-US');

        if (voice) utterance.voice = voice;

        utterance.lang = 'en-US';
        utterance.rate = 0.6; // 固定語速為稍微放慢的 0.8，適合小朋友
        utterance.pitch = 1.1;
        utterance.volume = 1.0;

        speechSynthesis.speak(utterance);
    }

    // 由於部分瀏覽器需要預載語音清單，加入這段確保第一次點擊就能抓到好聲音
    window.speechSynthesis.onvoiceschanged = () => {
        window.speechSynthesis.getVoices();
    };

    function speakCurrentWord() {
        if (currentData) speak(currentData.word.toLowerCase());
    }

    function addToPlaylist() {
        if (!currentData) return;
        if (savedWords.find(item => item.word === currentData.word)) {
            alert("這個單字已經在收藏本裡囉！");
            return;
        }
        savedWords.unshift({...currentData});
        localStorage.setItem('myWords', JSON.stringify(savedWords));
        renderList();
    }

    // 🌟 新增：刪除單字的功能
    function deleteWord(wordToDelete) {
        // 過濾掉要刪除的單字
        savedWords = savedWords.filter(item => item.word !== wordToDelete);
        // 更新 localStorage
        localStorage.setItem('myWords', JSON.stringify(savedWords));
        // 重新渲染清單
        renderList();
    }

    function renderList() {
        const listContainer = document.getElementById('wordList');
        listContainer.innerHTML = '';

        savedWords.forEach((item) => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.onclick = () => {
                currentData = item;
                updateLeftPanel();
                document.getElementById('result-area').style.display = 'block';
            };
            
            // 將單字裡的單引號處理一下，避免影響 HTML 語法
            const safeWord = item.word.replace(/'/g, "\\'");

            // 加入發音與刪除按鈕
            div.innerHTML = `
                <span>${item.word}</span>
                <div class="list-actions">
                    <button class="mini-btn mini-play" title="唸給我聽" onclick="event.stopPropagation(); speak('${safeWord}')">▶️</button>
                    <button class="mini-btn mini-delete" title="刪除單字" onclick="event.stopPropagation(); deleteWord('${safeWord}')">刪除</button>
                </div>
            `;
            listContainer.appendChild(div);
        });
    }
</script>

</body>
</html>
