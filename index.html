<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小學英文學習寶庫 🌟</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #FF6B6B; /* 珊瑚紅 */
            --secondary-color: #4ECDC4; /* 薄荷綠 */
            --accent-color: #FFD93D; /* 太陽黃 */
            --speak-color: #6C5CE7; /* 浪漫紫 */
        }

        body { 
            font-family: 'Microsoft JhengHei', sans-serif; 
            margin: 0; 
            background: #ffffff; /* 移除原本的綠色漸層，改為全白底色 */
            overflow-x: hidden;
        }

        /* 左側：查詢區滿版設定 */
        .left-panel { 
            padding: 40px; 
            display: flex; 
            flex-direction: column; 
            background: #fff;
            min-height: 100vh;
        }

        h1 { color: var(--primary-color); text-align: center; margin-bottom: 30px; font-weight: bold; }

        .search-box { display: flex; gap: 10px; margin-bottom: 25px; }
        
        input { 
            flex: 1; 
            padding: 15px 20px; 
            border: 3px solid var(--secondary-color); 
            border-radius: 50px; 
            font-size: 18px; 
            outline: none;
        }

        .search-btn { 
            background: var(--secondary-color); 
            color: white; 
            border: none; 
            padding: 0 30px; 
            border-radius: 50px; 
            font-size: 18px; 
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            white-space: nowrap;
        }
        .search-btn:hover { background: #3dbbb3; transform: scale(1.05); }

        /* 結果顯示區 */
        #result-area { 
            background: #FFFCEB; 
            border-radius: 20px; 
            padding: 30px; 
            border: 3px dashed var(--accent-color);
            display: none;
            animation: bounceIn 0.5s;
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.9); }
            70% { transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }

        .word-title { font-size: 32px; color: #333; margin: 0 0 15px 0; border-bottom: 2px solid #EEE; padding-bottom: 10px; font-weight: bold;}
        .word-meaning { font-size: 20px; color: #555; line-height: 1.6; background: white; padding: 15px; border-radius: 12px; min-height: 80px; }

        /* 按鈕並排設定 */
        .action-buttons { 
            margin-top: 25px; 
            display: flex; 
            gap: 15px; 
        }
        
        .custom-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        .speak-btn { background: var(--speak-color); }
        .add-btn { background: var(--primary-color); }

        .custom-btn:hover { transform: translateY(-3px); box-shadow: 0 6px 0 rgba(0,0,0,0.1); opacity: 0.9; }
        .custom-btn:active { transform: translateY(0); box-shadow: 0 2px 0 rgba(0,0,0,0.1); }

        /* 右側：清單區滿版設定 */
        .right-panel { 
            background: #F8F9FA; 
            padding: 40px 30px; 
            min-height: 100vh;
            border-left: 2px solid #E9ECEF;
        }

        h3 { color: #555; font-size: 22px; margin-top: 0; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; font-weight: bold;}

        .list-item { 
            background: white; 
            padding: 15px 20px; 
            margin-bottom: 12px; 
            border-radius: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .list-item:hover { border-color: var(--secondary-color); background: #f0fffe; }
        .list-item span { font-weight: bold; color: #444; font-size: 18px; flex: 1; }

        .list-actions { display: flex; gap: 8px; }

        .mini-btn { 
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .mini-play { background: #E8E6FF; color: var(--speak-color); }
        .mini-play:hover { background: #d0cfff; }
        
        .mini-delete { background: #FFE6E6; color: #FF6B6B; }
        .mini-delete:hover { background: #ffcccc; }

        /* 📱 RWD 行動裝置專用：小於 768px 時隱藏指定的區塊 */
        @media (max-width: 767.98px) {
            .left-panel, .right-panel { padding: 20px; min-height: calc(100vh - 60px); } /* 扣除上方按鈕高度 */
            .action-buttons { flex-direction: column; } /* 手機版按鈕改上下排列 */
            .mobile-hidden { display: none !important; } /* 控制顯示/隱藏的魔法 class */
        }
    </style>
</head>
<body>

<div class="d-md-none sticky-top bg-white border-bottom shadow-sm p-2 z-3">
    <button id="mobileToggleBtn" class="btn btn-outline-success w-100 fw-bold rounded-pill" onclick="toggleMobileView()">
        👉 切換至「⭐ 我的單字庫」
    </button>
</div>

<div class="container-fluid p-0">
    <div class="row g-0">
        
        <div id="leftSide" class="col-12 col-md-7 left-panel">
            <h1>🌟 英文學習小隊 🚀</h1>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="輸入單字或句子..." onkeypress="handleKeyPress(event)">
                <button class="search-btn" onclick="searchWord()">查詢</button>
            </div>

            <div id="result-area">
                <h2 id="displayWord" class="word-title"></h2>
                <div id="displayMeaning" class="word-meaning"></div>
                
                <div class="action-buttons">
                    <button class="custom-btn speak-btn" onclick="speakCurrentWord()">📢 唸給我聽</button>
                    <button class="custom-btn add-btn" onclick="addToPlaylist()">✨ 收藏起來</button>            
                </div>
            </div>
        </div>

        <div id="rightSide" class="col-12 col-md-5 right-panel mobile-hidden">
            <h3>⭐ 我的單字庫</h3>
            <div id="wordList"></div>
        </div>

    </div>
</div>

<script>
    let currentData = null;
    let savedWords = JSON.parse(localStorage.getItem('myWords')) || [];
    
    // 用來記錄手機版目前顯示的是哪一面 (true=左邊查詢區, false=右邊單字庫)
    let isShowingLeft = true; 

    renderList();

    // 📱 切換手機版畫面的功能
    function toggleMobileView() {
        const leftSide = document.getElementById('leftSide');
        const rightSide = document.getElementById('rightSide');
        const btn = document.getElementById('mobileToggleBtn');

        if (isShowingLeft) {
            // 切換到右側單字庫
            leftSide.classList.add('mobile-hidden');
            rightSide.classList.remove('mobile-hidden');
            btn.innerHTML = '👈 切換至「🔍 查詢區」';
        } else {
            // 切換回左側查詢區
            rightSide.classList.add('mobile-hidden');
            leftSide.classList.remove('mobile-hidden');
            btn.innerHTML = '👉 切換至「⭐ 我的單字庫」';
        }
        isShowingLeft = !isShowingLeft;
    }

    async function searchWord() {
        const input = document.getElementById('searchInput').value.trim();
        if (!input) return;

        const apiUrl = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(input)}&langpair=en|zh-TW`;
        
        try {
            document.getElementById('displayMeaning').innerText = "正在翻譯中...";
            document.getElementById('result-area').style.display = 'block';
            
            const response = await fetch(apiUrl);
            const data = await response.json();
            const translation = data.responseData.translatedText;

            currentData = {
                word: input,
                meaning: translation
            };

            updateLeftPanel();
        } catch (error) {
            alert("網路好像有點累了，請稍後再試！");
        }
    }

    function updateLeftPanel() {
        document.getElementById('displayWord').innerText = currentData.word;
        document.getElementById('displayMeaning').innerText = currentData.meaning;
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') searchWord();
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        const voices = speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Google US English')) || voices.find(v => v.lang === 'en-US');

        if (voice) utterance.voice = voice;

        utterance.lang = 'en-US';
        utterance.rate = 0.6; 
        utterance.pitch = 1.1;
        utterance.volume = 1.0;

        speechSynthesis.speak(utterance);
    }

    window.speechSynthesis.onvoiceschanged = () => {
        window.speechSynthesis.getVoices();
    };

    function speakCurrentWord() {
        if (currentData) speak(currentData.word.toLowerCase());
    }

    function addToPlaylist() {
        if (!currentData) return;
        if (savedWords.find(item => item.word === currentData.word)) {
            alert("這個單字已經在收藏本裡囉！");
            return;
        }
        savedWords.unshift({...currentData});
        localStorage.setItem('myWords', JSON.stringify(savedWords));
        renderList();
        alert("✨ 收藏成功！"); // 給手機使用者的貼心小提示
    }

    function deleteWord(wordToDelete) {
        savedWords = savedWords.filter(item => item.word !== wordToDelete);
        localStorage.setItem('myWords', JSON.stringify(savedWords));
        renderList();
    }

    function renderList() {
        const listContainer = document.getElementById('wordList');
        listContainer.innerHTML = '';

        savedWords.forEach((item) => {
            const div = document.createElement('div');
            div.className = 'list-item';
            
            // 點擊清單項目切換單字
            div.onclick = () => {
                currentData = item;
                updateLeftPanel();
                document.getElementById('result-area').style.display = 'block';
                
                // 若在手機版點擊單字，自動幫他切換回左邊查詢區查看翻譯
                if (window.innerWidth < 768 && !isShowingLeft) {
                    toggleMobileView();
                }
            };
            
            const safeWord = item.word.replace(/'/g, "\\'");

            div.innerHTML = `
                <span>${item.word}</span>
                <div class="list-actions">
                    <button class="mini-btn mini-play" title="唸給我聽" onclick="event.stopPropagation(); speak('${safeWord}')">▶️</button>
                    <button class="mini-btn mini-delete" title="刪除單字" onclick="event.stopPropagation(); deleteWord('${safeWord}')">刪除</button>
                </div>
            `;
            listContainer.appendChild(div);
        });
    }
</script>

</body>
</html>
